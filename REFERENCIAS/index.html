<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUPAI Fast Food | Menú Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E94B4D;
            --primary-glow: rgba(233, 75, 77, 0.4);
            --bg: #050505;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.05);
            --text: #F4F4F5;
            --text-muted: #A1A1AA;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Fixed background element to ensure consistent animation speed */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(233, 75, 77, 0.1), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(233, 75, 77, 0.15), transparent 30%),
                linear-gradient(rgba(5, 5, 5, 0.93), rgba(5, 5, 5, 0.93)),
                url('fondo.png');
            background-size: cover;
            background-position: center;
            z-index: -1; pointer-events: none;
        }

        @keyframes mobileBgPan {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        @media (max-width: 768px) {
            body::before {
                background-image: 
                    radial-gradient(circle at 15% 50%, rgba(233, 75, 77, 0.1), transparent 30%),
                    radial-gradient(circle at 85% 30%, rgba(233, 75, 77, 0.15), transparent 30%),
                    linear-gradient(rgba(5, 5, 5, 0.93), rgba(5, 5, 5, 0.93)),
                    url('fondo-celu.png');
                width: 100vw; height: 100vh;
                background-size: 150% 150%;
                animation: mobileBgPan 35s linear infinite alternate;
            }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        nav {
            background: rgba(5, 5, 5, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 1rem;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            text-align: center;
            flex-shrink: 0;
        }

        .logo { 
            height: 60px; 
            width: auto; 
            transition: var(--transition);
            filter: drop-shadow(0 4px 12px rgba(233,75,77,0.3));
        }

        .category-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 1rem 0.5rem 0.5rem;
            scrollbar-width: none;
            justify-content: flex-start;
        }
        .category-scroll::-webkit-scrollbar { display: none; }

        .cat-btn {
            background: var(--surface);
            color: var(--text-muted);
            padding: 10px 24px;
            border-radius: 100px;
            white-space: nowrap;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            transition: var(--transition);
        }
        @keyframes cat-pop {
            0% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.1) translateY(-4px); }
            100% { transform: scale(1) translateY(-2px); }
        }
        .cat-btn.active { 
            background: var(--primary); 
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
            transform: translateY(-2px);
            animation: cat-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @media (hover: hover) {
            .cat-btn:hover {
                background: var(--primary); 
                color: white;
                border-color: var(--primary);
                box-shadow: 0 0 20px var(--primary-glow);
                transform: translateY(-2px);
            }
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        .section-title { 
            color: white; 
            margin: 50px 0 30px; 
            text-transform: uppercase; 
            font-size: 1.5rem; 
            font-weight: 800;
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .section-title::after {
            content: '';
            height: 1px;
            flex-grow: 1;
            background: linear-gradient(90deg, var(--primary) 0%, transparent 100%);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .card-info { padding: 15px 12px; }
            .card-title { font-size: 0.95rem; margin-bottom: 6px; line-height: 1.2; font-weight: 800; text-align: left; }
            .card-desc { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-size: 0.75rem; margin-bottom: 12px; color: rgba(255,255,255,0.6); }
            .price-row { flex-direction: row; align-items: center; justify-content: space-between; gap: 0; }
            .card-price-label { font-size: 1.1rem; }
            .btn-cart { width: 36px; height: 36px; }
            .btn-cart svg { width: 18px; height: 18px; }
            .container { padding: 0 15px; }
            .section-title { font-size: 1.3rem; margin: 30px 0 20px; }
            
            .modal-content {
                height: 100vh;
                height: 100dvh;
                width: 100%;
                max-width: 100%;
                border-radius: 0;
                border: none;
            }
        }

        .card { 
            background: rgba(15, 15, 15, 0.4);
            border-radius: 24px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid var(--border);
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @media (hover: hover) {
            .card:hover { 
                transform: translateY(-8px); 
                border-color: rgba(233, 75, 77, 0.4);
                box-shadow: 0 20px 40px rgba(0,0,0,0.5);
                background: rgba(20, 20, 20, 0.6);
            }
        }

        .card-img-container {
            position: relative;
            width: 100%;
            padding-top: 65%;
            overflow: hidden;
            background: #111;
        }
        .card-img { 
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%; 
            object-fit: cover; 
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card:hover .card-img {
            transform: scale(1.08);
        }
        .card-img-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, rgba(15,15,15,1), transparent);
        }

        .card-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; position: relative; z-index: 2; background: linear-gradient(to top, rgba(15,15,15,1) 40%, transparent); }
        .card-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; color: white;}
        .card-desc { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; flex-grow: 1; font-weight: 300;}
        
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .card-price-label { color: white; font-weight: 800; font-size: 1.25rem; }
        
        .btn-add {
            background: rgba(233, 75, 77, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-add:hover { 
            background: var(--primary); 
            color: white;
            box-shadow: 0 8px 20px var(--primary-glow);
        }
        .btn-add:active { transform: scale(0.96); }

        .btn-cart {
            background: rgba(233, 75, 77, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-cart:hover { 
            background: var(--primary); 
            color: white;
            box-shadow: 0 8px 20px var(--primary-glow);
        }
        .btn-cart:active { transform: scale(0.96); }

        /* MODAL STYLES */
        .modal { 
            display: none; position: fixed; z-index: 3000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(12px);
            align-items: flex-end; justify-content: center; 
            opacity: 0; transition: opacity 0.4s ease;
        }
        .modal.active { display: flex; opacity: 1; }
        
        .modal-content { 
            background: #0f0f11; padding: 0; width: 100%; max-width: 600px;
            height: 88vh; border-radius: 30px 30px 0 0; position: relative;
            /* Animation handled by JS for hero transition */
            transform-origin: center center;
            overflow-y: auto;
            overflow-x: hidden;
            border: 1px solid var(--border);
            border-bottom: none;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.8);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 3500; 
            transition: var(--transition);
            border: 1px solid var(--border);
        }
        .close-modal:hover { background: white; color: black; transform: rotate(90deg); }
        .close-modal svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }

        .modal-img-container { width: 100%; height: 35vh; position: relative; background: #111;}
        .modal-img { width: 100%; height: 100%; object-fit: cover; }
        .modal-img-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(to top, #0f0f11, transparent);
        }

        .modal-body { padding: 30px; padding-bottom: 120px; }
        .modal-body h2 { font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        .opt-group-title {
            font-size: 0.8rem; font-weight: 800; color: var(--primary); 
            text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 15px;
            display: flex; align-items: center; gap: 10px;
        }
        .opt-group-title::after { content: ''; height: 1px; flex-grow: 1; background: var(--border); }

        .ing-label { 
            display: flex; align-items: center; font-size: 0.95rem; color: #ddd; 
            cursor: pointer; padding: 15px; border-radius: 12px;
            background: var(--surface); border: 1px solid var(--border); margin-bottom: 10px;
            transition: var(--transition); font-weight: 300;
        }
        .ing-label:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.1); }
        .ing-label input { 
            appearance: none; -webkit-appearance: none; width: 22px; height: 22px; 
            background: rgba(0,0,0,0.3); border: 1px solid #555; border-radius: 6px; margin-right: 15px; 
            transition: var(--transition); position: relative; cursor: pointer;
        }
        .ing-label input:checked { background: var(--primary); border-color: var(--primary); }
        .ing-label input:checked::after {
            content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 12px; font-weight: bold;
        }

        select, input[type="text"] { 
            width: 100%; padding: 15px; margin-bottom: 12px; background: rgba(0,0,0,0.5); 
            border: 1px solid var(--border); color: white; border-radius: 12px; 
            font-size: 1rem; outline: none; transition: var(--transition);
        }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23ffffff%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 15px top 50%; background-size: 12px auto;
        }
        select:focus, input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(233,75,77,0.2); }

        .modal-footer {
            position: sticky; bottom: 20px; width: 92%; margin: 0 auto; background: rgba(22, 22, 25, 0.95);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: 12px 15px 12px 30px; 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 100px;
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        /* CART BAR */
        .cart-bar {
            position: fixed; bottom: 30px; left: 0; right: 0; margin: 0 auto;
            width: 90%; max-width: 400px; background: var(--primary);
            backdrop-filter: blur(15px);
            padding: 16px 25px; border-radius: 100px; display: flex; 
            justify-content: space-between; align-items: center; font-weight: 800; 
            cursor: pointer; z-index: 2000; box-shadow: 0 10px 40px rgba(233, 75, 77, 0.4);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        .cart-bar:hover { transform: translateY(-5px); box-shadow: 0 15px 50px rgba(233, 75, 77, 0.5); }
        .cart-bar:active { transform: scale(0.95); }

        .cart-bar-left { display: flex; align-items: center; gap: 10px; }
        .cart-count { background: white; color: var(--primary); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold;}

        /* SIDEBAR (CART PANEL) */
        .sidebar { 
            position: fixed; bottom: -100%; left: 0; width: 100%; max-width: 100%; 
            height: 85vh; background: rgba(12,12,14,0.95); backdrop-filter: blur(25px);
            z-index: 1500; padding: 30px 20px; 
            transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
            border-top: 1px solid var(--border); border-radius: 30px 30px 0 0;
            display: flex; flex-direction: column; box-shadow: 0 -20px 50px rgba(0,0,0,0.8);
        }
        .sidebar.active { bottom: 0; }
        
        body.loaded.cart-open .cart-bar, body.cart-open .cart-bar {
            transform: translateY(-85vh);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
        }

        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .sidebar-header h2 { font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; color: white; }
        .close-sidebar { background: none; border: none; color: white; cursor: pointer; transition: var(--transition); }
        .close-sidebar:hover { transform: scale(1.1) rotate(90deg); color: var(--primary); }
        .close-sidebar svg { width: 26px; height: 26px; }

        .cart-items-container { flex-grow: 1; overflow-y: auto; padding-right: 5px; scrollbar-width: none; }
        
        .cart-item-wrapper {
            position: relative; overflow: hidden; border-radius: 16px; margin-bottom: 12px;
            background: var(--surface); border: 1px solid var(--border);
        }
        .cart-item {
            padding: 16px; background: rgba(15,15,15,1); display: flex; justify-content: space-between;
            align-items: center; position: relative; z-index: 2; transition: transform 0.3s ease; touch-action: pan-y;
        }
        .cart-item-info { flex-grow: 1; }
        .cart-item-title { font-weight: 600; font-size: 1rem; margin-bottom: 4px; display: flex; justify-content: space-between; padding-right: 15px;}
        .cart-item-mods { font-size: 0.8rem; color: var(--text-muted); font-weight: 300;}
        
        .delete-btn {
            background: rgba(255, 68, 68, 0.1); color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.2);
            width: 40px; height: 40px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; margin-left: 10px; transition: var(--transition);
        }
        .delete-btn:hover { background: #ff4444; color: white; transform: scale(1.05); }

        .btn-checkout {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white; border: none; padding: 16px; border-radius: 100px;
            font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase;
            font-size: 1rem; letter-spacing: 1px; box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
            transition: var(--transition); margin-top: 20px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-checkout:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(37, 211, 102, 0.4); }

        @keyframes cart-bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.12); } }
        .cart-bump { animation: cart-bounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #menu-container {
            display: flex;
            align-items: stretch;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            width: 100%;
            height: 100%;
            padding: 0;
            transition: opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #menu-container::-webkit-scrollbar { display: none; }

        .category-section {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: block;
            padding: 15px 15px 120px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        @keyframes fadeInTab {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LOADER STYLES */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), filter 1s ease;
        }
        #loader.fade-out {
            opacity: 0;
            transform: scale(3.5); /* Fly through effect */
            filter: blur(20px);
            pointer-events: none;
        }
        .loader-logo { 
            height: 90px; 
            animation: pulseLogo 2s infinite ease-in-out; 
            filter: drop-shadow(0 0 20px rgba(233,75,77,0.3));
        }
        .loader-text {
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeInUpLoader 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.2s;
            text-align: center;
        }
        @keyframes fadeInUpLoader {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader-spinner-wrapper {
            opacity: 0;
            animation: fadeInUpLoader 1s ease forwards;
            animation-delay: 0.5s;
            margin-top: 25px;
        }
        .loader-spinner {
            width: 34px; height: 34px; border: 3px solid rgba(233, 75, 77, 0.1);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        /* Menu Zoom-In Transition */
        body.init-load nav, body.init-load .container, body.init-load .cart-bar {
            transform: scale(0.92);
            opacity: 0;
            filter: blur(10px);
        }
        body.loaded nav, body.loaded .container, body.loaded .cart-bar {
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.2s ease, filter 1.2s ease;
            transform: scale(1);
            opacity: 1;
            filter: blur(0);
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulseLogo { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.8; } }
    </style>
</head>
<body class="init-load">

    <div id="loader">
        <img src="logo.png" class="loader-logo" onerror="this.src='https://via.placeholder.com/200x80/000/E94B4D?text=KUPAI+LOGO'">
        <h1 class="loader-text">¡Bienvenido a Kupai!</h1>
        <div class="loader-spinner-wrapper"><div class="loader-spinner"></div></div>
    </div>

    <nav>
        <img src="logo.png" alt="KUPAI" class="logo" onerror="this.src='https://via.placeholder.com/200x80/000/E94B4D?text=KUPAI+LOGO'">
        <div class="category-scroll" id="cat-nav"></div>
    </nav>

    <div id="menu-wrapper" style="overflow-y: hidden; width: 100%; flex: 1; display: flex; flex-direction: column;">
        <div class="container" id="menu-container"></div>
    </div>

    <div class="cart-bar" onclick="toggleCart()" id="main-cart-bar">
        <div class="cart-bar-left">

                                <p class="card-price-label">${p.v[0].p.toFixed(2)}</p>
                                <button class="btn-cart">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><path d="M3 6h18"></path><path d="M16 10a4 4 0 0 1-8 0"></path><line x1="12" y1="13" x2="12" y2="19"></line><line x1="9" y1="16" x2="15" y2="16"></line></svg>
                                </button>
                            </div>
                        </div>
                    </div>`;
                    globalIdx++;
                });
            });
            todoSection += `</div></div>`;
            container.innerHTML = todoSection;

            Object.keys(menuData).forEach(cat => {
                nav.innerHTML += `<button class="cat-btn" onclick="scrollToCat('${cat}', this)">${cat}</button>`;
                
                let section = `<div id="${cat}" class="category-section"><h2 class="section-title">${cat}</h2><div class="grid">`;
                menuData[cat].forEach((p, idx) => {
                    section += `<div class="card" style="animation-delay: ${idx * 0.05}s; opacity: 1;" onclick="abrirModal('${cat}', '${p.n}', this)">
                        <div class="card-img-container">
                            <img src="img/${normalizar(p.n)}.jpg" class="card-img" onerror="this.src='https://via.placeholder.com/400x300/1a1a1a/E94B4D?text=${p.n}'">
                            <div class="card-img-overlay"></div>
                        </div>
                        <div class="card-info">
                            <h3 class="card-title">${p.n}</h3>
                            <p class="card-desc">${p.d}</p>
                            <div class="price-row">
                                <p class="card-price-label">${p.v[0].p.toFixed(2)}</p>
                                <button class="btn-cart">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><path d="M3 6h18"></path><path d="M16 10a4 4 0 0 1-8 0"></path><line x1="12" y1="13" x2="12" y2="19"></line><line x1="9" y1="16" x2="15" y2="16"></line></svg>
                                </button>
                            </div>
                        </div>
                    </div>`;
                });
                section += `</div></div>`;
                container.innerHTML += section;
            });

            // Sincronizar scroll con botones y parallax
            let lastIndex = -1;
            let scrollTimeout;

            container.addEventListener('scroll', () => {
                const width = container.offsetWidth;
                if(width === 0) return;
                const scrollLeft = container.scrollLeft;
                const progress = scrollLeft / width;
                
                const sections = document.querySelectorAll('.category-section');
                
                // Efecto Parallax en tarjetas (60fps, atado al dedo)
                sections.forEach((sec, i) => {
                    const distance = Math.abs(scrollLeft - (i * width));
                    const ratio = Math.max(0, 1 - (distance / width));
                    
                    const cards = sec.querySelectorAll('.card');
                    cards.forEach(card => {
                        card.style.transform = `scale(${0.90 + (0.10 * ratio)})`;
                        card.style.opacity = `${0.3 + (0.7 * ratio)}`;
                    });
                });
                
                // Animación en TIEMPO REAL de la barra de navegación (atada al dedo)
                const buttons = document.querySelectorAll('.cat-btn');
                const i1 = Math.floor(progress);
                const i2 = Math.ceil(progress);
                const btn1 = buttons[i1];
                const btn2 = buttons[i2];
                const nav = document.getElementById('cat-nav');
                
                if (btn1 && btn2 && nav) {
                    const fraction = progress - i1;
                    const center1 = btn1.offsetLeft - (nav.offsetWidth / 2) + (btn1.offsetWidth / 2);
                    const center2 = btn2.offsetLeft - (nav.offsetWidth / 2) + (btn2.offsetWidth / 2);
                    nav.scrollLeft = center1 + (center2 - center1) * fraction;
                } else if (btn1 && nav) {
                    nav.scrollLeft = btn1.offsetLeft - (nav.offsetWidth / 2) + (btn1.offsetWidth / 2);
                }
                
                // Actualizar estilo activo al pasar del 50%
                const index = Math.round(progress);
                if (index !== lastIndex) {
                    lastIndex = index;
                    buttons.forEach((btn, i) => {
                        if(i === index) btn.classList.add('active');
                        else btn.classList.remove('active');
                    });
                }
                
                // Limpiar posiciones de scroll de categorías inactivas una vez que el usuario termina de deslizar
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => {
                    const finalIndex = Math.round(progress);
                    sections.forEach((sec, i) => {
                        if (i !== finalIndex) sec.scrollTop = 0;
                    });
                }, 200);
            });

            // Liberar tarjetas para que el Parallax tome control total
            setTimeout(() => {
                document.querySelectorAll('.card').forEach(c => c.style.animation = 'none');
                container.dispatchEvent(new Event('scroll'));
            }, 700);
        }

        function scrollToCat(cat, btn) {
            const container = document.getElementById('menu-container');
            const target = document.getElementById(cat);
            if(target && container) {
                target.scrollTo({ top: 0, behavior: 'smooth' }); // Llevar al tope de sus productos
                const sections = Array.from(container.querySelectorAll('.category-section'));
                const index = sections.indexOf(target);
                const currentIndex = Math.round(container.scrollLeft / container.offsetWidth);
                
                if (index > -1) {
                    // Si el usuario toca la categoría en la que ya está, no deslizamos, solo subimos al principio (ya se ejecutó arriba)
                    if (index === currentIndex) return;
                    
                    if (Math.abs(index - currentIndex) > 1) {
                        container.style.opacity = '0';
                        setTimeout(() => {
                            container.scrollLeft = index * container.offsetWidth;
                            
                            setTimeout(() => { 
                                container.style.opacity = '1'; 
                            }, 20);
                        }, 150);
                    } else {
                        container.scrollTo({ left: index * container.offsetWidth, behavior: 'smooth' });
                    }
                }
            }
        }

        function abrirModal(cat, n, el) {
            tempProd = menuData[cat].find(x => x.n === n);
            const m = document.getElementById('modal');
            const mc = document.getElementById('modal-content');
            
            // Preparation for Hero Transition
            m.style.display = 'flex';
            
            if (el) {
                const rect = el.getBoundingClientRect();
                const mcRect = mc.getBoundingClientRect();
                const originX = rect.left + rect.width / 2 - mcRect.left;
                const originY = rect.top + rect.height / 2 - mcRect.top;
                
                mc.style.transformOrigin = `${originX}px ${originY}px`;
                mc.style.transition = 'none';
                mc.style.transform = 'scale(0.1)';
                mc.style.opacity = '0';
            }
            
            document.getElementById('m-img').src = `img/${normalizar(tempProd.n)}.jpg`;
            document.getElementById('m-img').onerror = function() { this.src = `https://via.placeholder.com/600x400/1a1a1a/E94B4D?text=${tempProd.n}`; };
            
            document.getElementById('m-titulo').innerText = tempProd.n;
            document.getElementById('m-desc').innerText = tempProd.d;
            document.getElementById('m-version-select').innerHTML = tempProd.v.map((v, i) => `<option value="${i}">${v.t} (${v.p.toFixed(2)})</option>`).join('');
            
            const containerQuitar = document.getElementById('quitar-container');
            if (tempProd.ing.length > 0) {
                containerQuitar.style.display = 'block';
                document.getElementById('m-quitar-list').innerHTML = tempProd.ing.map(i => `<label class="ing-label"><input type="checkbox" class="no-ing" value="${i}">Sin ${i}</label>`).join('');
            } else {
                containerQuitar.style.display = 'none';
            }
            
            const containerExtras = document.getElementById('extras-container');
            const listExtras = document.getElementById('m-extras-list');
            
            if (tempProd.ex && tempProd.ex.length > 0) {
                containerExtras.style.display = 'block';
                listExtras.innerHTML = tempProd.ex.map((ex, i) => 
                    `<label class="ing-label"><input type="checkbox" class="extra-ing" data-p="${ex.p}" value="${ex.t}" onchange="actualizarPrecioModal()">+ ${ex.t} (+${ex.p.toFixed(2)})</label>`
                ).join('');
            } else {
                containerExtras.style.display = 'none';
                listExtras.innerHTML = "";
            }

            actualizarPrecioModal();
            
            // Trigger Hero Animation
            void mc.offsetWidth; // force reflow
            setTimeout(() => { 
                m.classList.add('active'); 
                if (el) {
                    mc.style.transition = 'transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease';
                    mc.style.transform = 'scale(1)';
                    mc.style.opacity = '1';
                }
            }, 10);
        }

        function cerrarModal() { 
            const m = document.getElementById('modal');
            const mc = document.getElementById('modal-content');
            
            mc.style.transform = 'scale(0.8)';
            mc.style.opacity = '0';
            m.classList.remove('active');
            
            setTimeout(() => {
                m.style.display = 'none';
            }, 400);
        }

        function actualizarPrecioModal() {
            let base = tempProd.v[document.getElementById('m-version-select').value].p;
            let extras = 0;
            document.querySelectorAll('.extra-ing:checked').forEach(el => {
                extras += parseFloat(el.getAttribute('data-p'));
            });
            document.getElementById('m-precio-final').innerText = (base + extras).toFixed(2);
        }

        function lanzarAlCarrito() {
            const cartBar = document.getElementById('main-cart-bar');
            const mc = document.getElementById('modal-content');
            const m = document.getElementById('modal');
            
            const v = tempProd.v[document.getElementById('m-version-select').value];
            let finalP = v.p;
            let mods = [];
            document.querySelectorAll('.no-ing:checked').forEach(e => mods.push("Sin " + e.value));
            document.querySelectorAll('.extra-ing:checked').forEach(e => {
                mods.push("+ " + e.value);
                finalP += parseFloat(e.getAttribute('data-p'));
            });

            carrito.push({ 
                id: Date.now() + Math.random(),
                n: `${tempProd.n} (${v.t})`, 
                p: finalP, 
                m: mods.join(', ') 
            });

            const clone = mc.cloneNode(true);
            const mcRect = mc.getBoundingClientRect();
            
            clone.style.position = 'fixed';
            clone.style.top = mcRect.top + 'px';
            clone.style.left = mcRect.left + 'px';
            clone.style.width = mcRect.width + 'px';
            clone.style.height = mcRect.height + 'px';
            clone.style.margin = '0';
            clone.style.zIndex = '9999';
            clone.style.transition = 'all 0.35s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.2s ease';
            clone.style.overflow = 'hidden';
            clone.style.transform = 'none';
            
            Array.from(clone.children).forEach(c => {
                c.style.transition = 'opacity 0.2s ease';
            });
            
            document.body.appendChild(clone);
            
            m.classList.remove('active');
            m.style.display = 'none';
            
            // FASE 1: Convertirse en una bola roja pura más pequeña en el centro
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    clone.style.borderRadius = '50%';
                    clone.style.width = '28px';
                    clone.style.height = '28px';
                    clone.style.left = 'calc(50vw - 14px)'; 
                    clone.style.top = 'calc(50vh - 14px)';
                    clone.style.backgroundColor = 'var(--primary)';
                    clone.style.boxShadow = '0 0 25px var(--primary)';
                    
                    Array.from(clone.children).forEach(c => {
                        c.style.opacity = '0';
                    });
                });
            });

            // FASE 2: Lanzarse al carrito siendo aún más pequeña
            setTimeout(() => {
                clone.style.transition = 'all 0.4s cubic-bezier(0.5, 0, 0.2, 1)';
                const cartRect = cartBar.getBoundingClientRect();
                clone.style.width = '16px';
                clone.style.height = '16px';
                clone.style.left = (cartRect.left + cartRect.width / 2 - 8) + 'px'; 
                clone.style.top = (cartRect.top + cartRect.height / 2 - 8) + 'px';
            }, 350);

            // FASE 3: Eliminar bola y rebotar carrito
            setTimeout(() => {
                if (clone.parentNode) document.body.removeChild(clone);
                actualizarUI();
                cartBar.classList.add('cart-bump');
                setTimeout(() => { cartBar.classList.remove('cart-bump'); }, 500);
            }, 750);
        }

        function eliminarItem(idx) {
            const item = carrito[idx];
            if(!item || item.deleting) return;
            item.deleting = true;

            const items = document.querySelectorAll('.cart-item-wrapper');
            const target = items[idx];
            if(target) {
                target.style.transform = 'translateX(-100%)';
                target.style.opacity = '0';
            }
            
            setTimeout(() => {
                const realIdx = carrito.findIndex(x => x.id === item.id);
                if(realIdx > -1) {
                    carrito.splice(realIdx, 1);
                    actualizarUI();
                }
            }, 300);
        }

        let touchStartX = 0;
        let touchMoveX = 0;

        function handleTouchStart(e) { touchStartX = e.touches[0].clientX; }
        function handleTouchMove(e, element) {
            touchMoveX = e.touches[0].clientX;
            let diff = touchStartX - touchMoveX;
            if (diff > 0 && diff < 100) {
                element.style.transform = `translateX(-${diff}px)`;
            }
        }
        function handleTouchEnd(e, idx, element) {
            let diff = touchStartX - touchMoveX;
            if (diff > 70) {
                eliminarItem(idx);
            } else {
                element.style.transform = `translateX(0)`;
            }
            touchStartX = 0; touchMoveX = 0;
        }

        function actualizarUI() {
            let total = 0;
            document.getElementById('count').innerText = carrito.length;
            const container = document.getElementById('cart-items');
            container.innerHTML = "";

            if (carrito.length === 0) {
                container.innerHTML = "<p style='color: var(--text-muted); text-align: center; margin-top: 50px; font-weight: 300;'>Tu carrito está vacío</p>";
            }

            carrito.forEach((item, idx) => {
                total += item.p;
                const wrapper = document.createElement('div');
                wrapper.className = 'cart-item-wrapper';
                wrapper.style.transition = 'all 0.3s ease';
                
                wrapper.innerHTML = `
                    <div style="position: absolute; right: 0; top: 0; width: 100%; height: 100%; background: #ff4444; display: flex; align-items: center; justify-content: flex-end; padding-right: 20px; color: white; font-weight: 800; font-size: 0.8rem; z-index: 1;">ELIMINAR</div>
                    <div class="cart-item" 
                         ontouchstart="handleTouchStart(event)" 
                         ontouchmove="handleTouchMove(event, this)" 
                         ontouchend="handleTouchEnd(event, ${idx}, this)">
                        <div class="cart-item-info">
                            <div class="cart-item-title">
                                <span>${item.n}</span> 
                                <span style="color: var(--primary);">${item.p.toFixed(2)}</span>
                            </div>
                            <div class="cart-item-mods">${item.m || 'Original'}</div>
                        </div>
                        <button class="delete-btn" onclick="eliminarItem(${idx})">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                `;
                container.appendChild(wrapper);
            });
            
            document.getElementById('total-bar').innerText = total.toFixed(2);
        }

        function toggleCart() { 
            document.getElementById('cart-sidebar').classList.toggle('active'); 
            document.body.classList.toggle('cart-open');
        }

        function enviarWhatsApp() {
            const nom = document.getElementById('nombre').value;
            const dir = document.getElementById('direccion').value;
            if(!nom || !dir || carrito.length === 0) return alert("Faltan datos o el carrito está vacío.");
            let msg = `*NUEVO PEDIDO KUPAI*\n*Cliente:* ${nom}\n*Dirección:* ${dir}\n*Pago:* ${document.getElementById('pago').value}\n\n`;
            carrito.forEach(i => msg += `• ${i.n} - _${i.m || 'Normal'}_\n`);
            msg += `\n*TOTAL: ${document.getElementById('total-bar').innerText}*`;
            window.open(`https://wa.me/${MI_WHATSAPP}?text=${encodeURIComponent(msg)}`);
        }

        // Funcionalidad para cerrar el carrito deslizando hacia abajo
        const cartSidebar = document.getElementById('cart-sidebar');
        let cartStartY = 0;
        let cartCurrentY = 0;
        let isCartDragging = false;

        cartSidebar.addEventListener('touchstart', (e) => {
            // No iniciar el arrastre si se toca un elemento interactivo (inputs, botones, selects)
            if (['INPUT', 'SELECT', 'TEXTAREA', 'BUTTON'].includes(e.target.tagName) || e.target.closest('button')) {
                return;
            }

            const itemsContainer = document.getElementById('cart-items');
            // Permitir scroll normal si el usuario está scrolleando los productos dentro del carrito
            if (itemsContainer.contains(e.target) && itemsContainer.scrollTop > 0) {
                return;
            }
            cartStartY = e.touches[0].clientY;
            isCartDragging = true;
            cartSidebar.style.transition = 'none'; // Quitar transición para seguimiento instantáneo del dedo
        }, { passive: true });

        cartSidebar.addEventListener('touchmove', (e) => {
            if (!isCartDragging) return;
            cartCurrentY = e.touches[0].clientY;
            const deltaY = cartCurrentY - cartStartY;
            
            // Solo arrastrar hacia abajo
            if (deltaY > 0) {
                if (e.cancelable) e.preventDefault();
                cartSidebar.style.transform = `translateY(${deltaY}px)`;
            }
        }, { passive: false });

        cartSidebar.addEventListener('touchend', () => {
            if (!isCartDragging) return;
            isCartDragging = false;
            
            const deltaY = cartCurrentY - cartStartY;
            // Restaurar transición suave para que regrese o se cierre elegantemente
            cartSidebar.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
            
            if (deltaY > 80) {
                // Umbral cruzado, cerrar carrito
                toggleCart();
                // Limpiar estilos en línea para devolver el control al CSS original
                setTimeout(() => {
                    cartSidebar.style.transform = '';
                    cartSidebar.style.transition = '';
                }, 400);
            } else {
                // No cruzó el umbral, regresar a su posición
                cartSidebar.style.transform = 'translateY(0)';
                setTimeout(() => {
                    cartSidebar.style.transform = '';
                    cartSidebar.style.transition = '';
                }, 300);
            }
        });

        init();
        actualizarUI();

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('fade-out');
                document.body.classList.remove('init-load');
                document.body.classList.add('loaded');
            }, 1200);
        });
    </script>
</body>
